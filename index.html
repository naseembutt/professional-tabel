<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle" id="theme-toggle">Dark Mode</div>
    <div class="container">
    <h1>Most Active Users</h1>
    
    <div class="spinner" id="spinner" style="display: none;">
        <i class="fas fa-cog fa-spin"></i>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <th class="name-column">Name <i class="fas fa-sort"></i></th>
                <th class="email-column">Email <i class="fas fa-sort"></i></th>
                <th class="email-column">Username <i class="fas fa-sort"></i></th>
                <th class="email-column">Country <i class="fas fa-sort"></i></th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div class="pagination" id="pagination">
        <button id="pre-btn"><i class="fas fa-chevron-left"></i></button>
        <span id="page-number">1</span>
        <button id="next-btn"><i class="fas fa-chevron-right"></i></button>
    </div> 
</div>

    <script src="app.js"></script>
</body>
</html>
